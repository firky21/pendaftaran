<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pendaftaran - MA Muhammadiyah 1 Paciran</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome Vector Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .form-section {
            padding: 120px 0 60px;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-blue);
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(10, 58, 116, 0.2);
            background: rgba(255, 255, 255, 0.7);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--primary-light);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(24, 111, 223, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animated">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar scrolled" id="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <span class="logo-icon"><i class="fa-solid fa-graduation-cap"></i></span>
                <span class="logo-text">MAM 1 Paciran</span>
            </a>
            <div class="nav-cta">
                <a href="index.html" class="btn btn-outline btn-sm">Kembali ke Beranda</a>
            </div>
        </div>
    </nav>

    <!-- Form Section -->
    <section class="form-section">
        <div class="container">
            <div class="form-container glass-panel reveal active">
                <div class="section-header" style="margin-bottom: 40px;">
                    <h2>Formulir Pendaftaran</h2>
                    <p>Lengkapi data diri Anda dengan benar.</p>
                </div>
                
                <form id="registrationForm" onsubmit="event.preventDefault(); alert('Terima kasih! Pendaftaran berhasil dikirim (Ini adalah Mockup).'); window.location.href='index.html';">
                    <!-- Data Diri -->
                    <h3 style="margin-bottom: 20px; border-bottom: 2px solid var(--primary-light); padding-bottom: 10px; display: inline-block;">Data Diri Siswa</h3>
                    
                    <div class="form-group">
                        <label for="fullName">Nama Lengkap</label>
                        <input type="text" id="fullName" class="form-control" placeholder="Masukkan nama lengkap Anda" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nisn">NISN</label>
                            <input type="number" id="nisn" class="form-control" placeholder="Nomor Induk Siswa Nasional" required>
                        </div>
                        <div class="form-group">
                            <label for="gender">Jenis Kelamin</label>
                            <select id="gender" class="form-control" required>
                                <option value="" disabled selected>Pilih Jenis Kelamin</option>
                                <option value="L">Laki-laki</option>
                                <option value="P">Perempuan</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Data Pendidikan & Jurusan -->
                    <h3 style="margin-bottom: 20px; margin-top: 20px; border-bottom: 2px solid var(--primary-light); padding-bottom: 10px; display: inline-block;">Pilihan Jurusan</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="school">Asal Sekolah</label>
                            <input type="text" id="school" class="form-control" placeholder="Contoh: SMP Negeri 1 Paciran" required>
                        </div>
                        <div class="form-group">
                            <label for="major">Pilihan Jurusan</label>
                            <select id="major" class="form-control" required>
                                <option value="" disabled selected>Pilih Jurusan</option>
                                <option value="ipa">IPA</option>
                                <option value="agama">Agama</option>
                                <option value="itcp">ITCP (Information Tech & Computer Prog)</option>
                                <option value="acp">ACP (Arabic & English Comm Prog)</option>
                                <option value="m-ico">M-ICO (Intl Class Option)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top: 40px; text-align: center;">
                        <button type="submit" class="btn btn-primary btn-lg shine-effect" style="width: 100%; border-radius: 12px;">Kirim Data Pendaftaran</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Simple Footer -->
    <footer class="footer" style="padding: 30px 0;">
        <div class="container" style="text-align: center;">
            <p>&copy; 2026 MA Muhammadiyah 1 Paciran. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
